<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contactez le Seattle'Breizh à Lorient pour réserver une table. Formulaire de réservation, horaires et plan d'accès.">
  <title>Contact & Réservation — Seattle'Breizh</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Contact & Réservation — Seattle'Breizh">
  <meta property="og:description" content="Réservez votre table au Seattle'Breizh, 7 Rue Dr Waquet, Lorient.">
  <meta property="og:image" content="images/index-hero.jpg">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
</head>
<body data-page="contact">

  <div id="site-header"></div>

  <section class="hero hero--compact" style="background-image: url('images/index-hero.jpg');">
    <div class="hero-content">
      <h1>Contact & Réservation</h1>
      <p>Une question, une envie de ribs ? Écrivez-nous ou réservez directement.</p>
    </div>
  </section>

  <section class="section texture-bg">
    <div class="contact-layout">
      <div class="contact-form-wrap">
        <h2>Réserver une table</h2>
        <!-- Remplacer yourformid par votre ID Formspree -->
        <form action="https://formspree.io/f/yourformid" method="POST">
          <div class="form-group">
            <label for="name">Nom</label>
            <input type="text" id="name" name="name" placeholder="Votre nom" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Votre email" required>
          </div>
          <div class="form-group">
            <label for="date">Date souhaitée</label>
            <input type="date" id="date" name="date" required>
          </div>
          <div class="form-group">
            <label for="guests">Nombre de personnes</label>
            <select id="guests" name="guests" required>
              <option value="" disabled selected>Choisir</option>
              <option value="1">1 personne</option>
              <option value="2">2 personnes</option>
              <option value="3">3 personnes</option>
              <option value="4">4 personnes</option>
              <option value="5">5 personnes</option>
              <option value="6+">6 personnes et plus</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Allergies, occasion spéciale, demande particulière…"></textarea>
          </div>
          <button type="submit" class="btn">Envoyer la demande</button>
        </form>
      </div>

      <div class="info-card">
        <h3>Informations pratiques</h3>
        <div class="info-card__item">
          <strong>Adresse</strong>
          <p>7 Rue Dr Waquet<br>56100 Lorient</p>
        </div>
        <div class="info-card__item">
          <strong>Horaires</strong>
          <p>Mardi – Samedi<br>12h – 14h & 19h – 22h</p>
        </div>
        <div class="info-card__item">
          <strong>Accès</strong>
          <p>
            <a href="https://maps.google.com/?q=7+rue+Dr+Waquet,+56100+Lorient" target="_blank" rel="noopener">Voir sur Google Maps →</a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <div class="map-embed">
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d670.6686991548908!2d-3.365330330370925!3d47.7489641999326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x48105e514c8c1791%3A0xbcef4506190fffe8!2s7%20Rue%20Dr%20Waquet%2C%2056100%20Lorient!5e0!3m2!1sen!2sfr!4v1760190794935!5m2!1sen!2sfr" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Carte Google Maps du Seattle'Breizh"></iframe>
  </div>

  <div id="site-footer"></div>

  <script src="js/layout.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
